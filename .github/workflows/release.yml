name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependency
        run: python -m pip install --disable-pip-version-check -r requirements-build.txt

      - name: Select package version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "RELEASE_VERSION=${{ github.ref_name }}" >> $env:GITHUB_ENV
          } else {
            "RELEASE_VERSION=dev-${{ github.run_number }}" >> $env:GITHUB_ENV
          }

      - name: Build portable Windows package
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/build_release.ps1 -Version $env:RELEASE_VERSION -Python python

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DART-OT-${{ env.RELEASE_VERSION }}-windows-x64
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath release -File | Select-Object -ExpandProperty FullName
          gh release create "${{ github.ref_name }}" $assets `
            --verify-tag `
            --title "DART-OT ${{ github.ref_name }}" `
            --generate-notes
